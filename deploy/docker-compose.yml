name: flashseat

services:
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flashseat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flashseat-local}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flashseat}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4.1-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.0.5-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-flashseat}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-flashseat-local}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.21.8
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 10

  identity-api:
    build:
      context: ..
      dockerfile: src/Services/Identity/FlashSeat.Identity.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__IdentityDb: Host=postgres;Port=5432;Database=flashseat_identity;Username=${POSTGRES_USER:-flashseat};Password=${POSTGRES_PASSWORD:-flashseat-local}
      Jwt__Issuer: ${JWT_ISSUER:-flashseat-local}
      Jwt__Audience: ${JWT_AUDIENCE:-flashseat-api}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-development-only-signing-key-change-me-123456789}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  events-api:
    build:
      context: ..
      dockerfile: src/Services/Events/FlashSeat.Events.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__EventsDb: Host=postgres;Port=5432;Database=flashseat_events;Username=${POSTGRES_USER:-flashseat};Password=${POSTGRES_PASSWORD:-flashseat-local}
      Jwt__Issuer: ${JWT_ISSUER:-flashseat-local}
      Jwt__Audience: ${JWT_AUDIENCE:-flashseat-api}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-development-only-signing-key-change-me-123456789}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  booking-api:
    build:
      context: ..
      dockerfile: src/Services/Booking/FlashSeat.Booking.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__BookingDb: Host=postgres;Port=5432;Database=flashseat_booking;Username=${POSTGRES_USER:-flashseat};Password=${POSTGRES_PASSWORD:-flashseat-local}
      ConnectionStrings__Redis: redis:6379
      Jwt__Issuer: ${JWT_ISSUER:-flashseat-local}
      Jwt__Audience: ${JWT_AUDIENCE:-flashseat-api}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-development-only-signing-key-change-me-123456789}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-flashseat}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-flashseat-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      events-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-api:
    build:
      context: ..
      dockerfile: src/Services/Payment/FlashSeat.Payment.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PaymentDb: Host=postgres;Port=5432;Database=flashseat_payment;Username=${POSTGRES_USER:-flashseat};Password=${POSTGRES_PASSWORD:-flashseat-local}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-flashseat}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-flashseat-local}
      Jwt__Issuer: ${JWT_ISSUER:-flashseat-local}
      Jwt__Audience: ${JWT_AUDIENCE:-flashseat-api}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-development-only-signing-key-change-me-123456789}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      booking-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-worker:
    build:
      context: ..
      dockerfile: src/Workers/FlashSeat.Notification.Worker/Dockerfile
    environment:
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-flashseat}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-flashseat-local}
    depends_on:
      rabbitmq:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: src/Gateway/FlashSeat.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      WebOrigin: ${WEB_ORIGIN:-http://localhost:5173}
    ports:
      - "5000:8080"
    depends_on:
      identity-api:
        condition: service_healthy
      events-api:
        condition: service_healthy
      booking-api:
        condition: service_healthy
      payment-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: src/Web/flashseat-web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
